<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽博深淵：自動超載 | Cyber Abyss: Auto-Drive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #030508; overflow: hidden; font-family: monospace; }
        canvas { background-color: #04060b; border: 2px solid #1e293b; box-shadow: 0 0 25px rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between text-slate-400 select-none">

    <!-- 頂部即時核心日誌列 -->
    <nav class="border-b border-slate-900 bg-slate-950/80 px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="./" class="text-xs px-2.5 py-1 bg-slate-900 border border-slate-800 rounded hover:text-indigo-400 transition font-bold">← 回首頁</a>
            <span class="text-xs text-emerald-400 font-bold animate-pulse">● ENGINE_LOADED_IMMEDIATELY // DIRECT_PLAY_ACTIVE</span>
        </div>
        <span class="text-[10px] text-slate-600 font-mono">[ NO_BUTTONS_ARCHITECTURE ]</span>
    </nav>

    <!-- 遊戲唯一舞台區塊 -->
    <main class="flex-grow flex items-center justify-center p-2">
        <div class="w-full max-w-4xl flex flex-col items-center">
            <!-- 唯一核心 Canvas 畫布 -->
            <canvas id="stageCanvas" width="900" height="520" class="w-full h-auto block rounded-xl"></canvas>
        </div>
    </main>

    <!-- 頁尾技術標籤 -->
    <footer class="border-t border-slate-900 bg-slate-950/40 py-2.5 text-center text-[10px] text-slate-600 tracking-wider">
        CORE_LOG: RUNTIME_INSTANT_START // PIPELINE: PURE_CANVAS_RENDER // AUTH: KUROKO_P
    </footer>

    <!-- ==========================================================================
         CORE GAME ENGINE (零按鈕、全自動化高階網頁街機引擎)
         ========================================================================== -->
    <script>
        window.addEventListener('load', () => {
            const canvas = document.getElementById('stageCanvas');
            const ctx = canvas.getContext('2d');

            // --- 1. 高級二維向量數學庫 ---
            class Vec2 {
                constructor(x = 0, y = 0) { this.x = x; this.y = y; }
                set(x, y) { this.x = x; this.y = y; return this; }
                add(v) { this.x += v.x; this.y += v.y; return this; }
                mult(n) { this.x *= n; this.y *= n; return this; }
                mag() { return Math.sqrt(this.x * this.x + this.y * this.y); }
                normalize() { let m = this.mag(); if (m !== 0) { this.x /= m; this.y /= m; } return this; }
                dist(v) { return Math.sqrt((this.x - v.x)**2 + (this.y - v.y)**2); }
            }

            // --- 2. 遊戲全局系統大腦變數 ---
            let state = 'PLAYING'; // PLAYING, GAMEOVER
            let gameTime = 0;
            let lastTimestamp = 0;
            let spawnTimer = 0;
            let clockTimer = 0;
            
            let kills = 0;
            let score = 0;
            let screenShake = 0;
            let gameOverCountdown = 3.0; // 死亡後自動重開倒數秒數

            let mousePos = new Vec2(450, 260);

            // 戰機載具物件
            let player = {
                pos: new Vec2(450, 260),
                radius: 14,
                speed: 4.2,
                hp: 100,
                maxHp: 100,
                level: 1,
                xp: 0,
                nextXp: 10,
                weaponLv: 1,
                teslaLv: 0,
                shootCooldown: 14,
                shootTimer: 0,
                invincible: 0,
                trail: []
            };

            // 實體儲存陣列
            let bullets = [];
            let enemies = [];
            let gems = [];
            let particles = [];
            let stars = [];

            // 預先生成星空背景粒子
            for(let i=0; i<40; i++) {
                stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5 + 0.5, speed: Math.random()*20 + 10 });
            }

            // 追蹤滑鼠游標坐標
            canvas.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                mousePos.x = ((e.clientX - rect.left) / rect.width) * canvas.width;
                mousePos.y = ((e.clientY - rect.top) / rect.height) * canvas.height;
            });
            // 支援行動裝置手勢滑動
            canvas.addEventListener('touchmove', (e) => {
                if(e.touches.length > 0) {
                    const rect = canvas.getBoundingClientRect();
                    mousePos.x = ((e.touches[0].clientX - rect.left) / rect.width) * canvas.width;
                    mousePos.y = ((e.touches[0].clientY - rect.top) / rect.height) * canvas.height;
                }
            }, { passive: true });

            // 浮動傷害/升級文字粒子生成
            function createText(x, y, txt, col) {
                particles.push({ x, y, txt, col, alpha: 1, vy: -1.3 });
            }

            // 刷怪演算法機制
            function triggerWaveSpawn() {
                if (enemies.length > 100) return;
                let ang = Math.random() * Math.PI * 2;
                let ex = player.pos.x + Math.cos(ang) * 530;
                let ey = player.pos.y + Math.sin(ang) * 530;
                
                let seed = Math.random();
                let type = 'SWARM';
                if (gameTime > 50 && seed > 0.75) type = 'ELITE';
                else if (gameTime > 20 && seed > 0.55) type = 'STRIKER';

                enemies.push({
                    pos: new Vec2(ex, ey),
                    radius: type==='ELITE'? 17 : (type==='STRIKER'? 9 : 12),
                    hp: type==='ELITE'? 60 : (type==='STRIKER'? 10 : 18 + gameTime*0.1),
                    speed: type==='STRIKER'? 2.5 : 1.3 + Math.random()*0.3,
                    col: type==='ELITE'? '#34d399' : (type==='STRIKER'? '#f43f5e' : '#a5b4fc'),
                    type: type,
                    flash: 0
                });
            }

            // 全自動升級系統 (完全不需要點擊按鈕！)
            function processAutoUpgrade() {
                player.level++;
                player.xp -= player.nextXp;
                player.nextXp = Math.floor(player.nextXp * 1.3) + 6;

                // 隨機在現有流派中超載升級
                let choose = Math.random() > 0.5 ? 'weapon' : 'tesla';
                if (choose === 'weapon' && player.weaponLv < 3) {
                    player.weaponLv++;
                    createText(player.pos.x, player.pos.y - 25, `▲ 武器突變升級 LV.${player.weaponLv}`, '#67e8f9');
                } else {
                    player.teslaLv++;
                    createText(player.pos.x, player.pos.y - 25, `⚡ 特斯拉矩陣擴張 LV.${player.teslaLv}`, '#c084fc');
                }
            }

            // 重啟重置戰場引擎
            function rebootEngine() {
                state = 'PLAYING';
                gameTime = 0; clockTimer = 0; spawnTimer = 0; kills = 0; score = 0; screenShake = 0;
                gameOverCountdown = 3.0;

                player.pos.set(450, 260); player.hp = 100; player.level = 1; player.xp = 0; player.nextXp = 10;
                player.weaponLv = 1; player.teslaLv = 0; player.invincible = 0;
                
                bullets = []; enemies = []; gems = []; particles = [];
                lastTimestamp = performance.now();
            }

            // --- 3. THE MAIN ENGINE TICK LOOP (主物理運算核心) ---
            function tick(timestamp) {
                if (!lastTimestamp) lastTimestamp = timestamp;
                let dt = (timestamp - lastTimestamp) / 1000;
                lastTimestamp = timestamp;
                if (dt > 0.1) dt = 0.1;

                if (state === 'PLAYING') {
                    // 計時器邏輯
                    clockTimer += dt;
                    if (clockTimer >= 1.0) { clockTimer -= 1.0; gameTime++; }

                    // 生怪速度公式
                    spawnTimer += dt;
                    let spawnRate = Math.max(0.15, 0.7 - (gameTime * 0.003));
                    if (spawnTimer >= spawnRate) { spawnTimer -= spawnRate; triggerWaveSpawn(); }

                    // 玩家戰機緩衝游動跟隨滑鼠
                    let toMouse = new Vec2(mousePos.x - player.pos.x, mousePos.y - player.pos.y);
                    let distMouse = toMouse.mag();
                    if (distMouse > 5) {
                        toMouse.normalize().mult(player.speed);
                        player.pos.add(toMouse);
                    }

                    if (player.invincible > 0) player.invincible--;

                    // 殘影歷史堆疊
                    player.trail.push({x: player.pos.x, y: player.pos.y});
                    if (player.trail.length > 5) player.trail.shift();

                    // 自動火控子彈發射
                    player.shootTimer++;
                    if (player.shootTimer >= player.shootCooldown) {
                        player.shootTimer = 0;
                        let ang = Math.atan2(mousePos.y - player.pos.y, mousePos.x - player.pos.x);
                        if (player.weaponLv === 1) {
                            bullets.push({pos: new Vec2(player.pos.x, player.pos.y), vx: Math.cos(ang)*7.5, vy: Math.sin(ang)*7.5});
                        } else if (player.weaponLv === 2) {
                            bullets.push({pos: new Vec2(player.pos.x, player.pos.y), vx: Math.cos(ang-0.15)*8, vy: Math.sin(ang-0.15)*8});
                            bullets.push({pos: new Vec2(player.pos.x, player.pos.y), vx: Math.cos(ang+0.15)*8, vy: Math.sin(ang+0.15)*8});
                        } else {
                            bullets.push({pos: new Vec2(player.pos.x, player.pos.y), vx: Math.cos(ang)*8.5, vy: Math.sin(ang)*8.5});
                            bullets.push({pos: new Vec2(player.pos.x, player.pos.y), vx: Math.cos(ang-0.25)*8.5, vy: Math.sin(ang-0.25)*8.5});
                            bullets.push({pos: new Vec2(player.pos.x, player.pos.y), vx: Math.cos(ang+0.25)*8.5, vy: Math.sin(ang+0.25)*8.5});
                        }
                    }

                    // 更新常規子彈位置
                    for(let i=bullets.length-1; i>=0; i--) {
                        let b = bullets[i]; b.pos.x += b.vx; b.pos.y += b.vy;
                        if (b.pos.x<0 || b.pos.x>canvas.width || b.pos.y<0 || b.pos.y>canvas.height) bullets.splice(i, 1);
                    }

                    // 水晶引力磁吸與收集判定
                    for(let i=gems.length-1; i>=0; i--) {
                        let g = gems[i];
                        let gd = g.pos.dist(player.pos);
                        if (gd < 95) { // 磁吸半徑
                            let pull = player.pos.copy().sub(g.pos).normalize().mult(player.speed * 1.5);
                            g.pos.add(pull);
                        }
                        if (gd < player.radius + 6) {
                            player.xp += g.val; score += g.val * 20; gems.splice(i, 1);
                            if (player.xp >= player.nextXp) processAutoUpgrade();
                        }
                    }

                    // 特斯拉隨機追蹤雷射電阻發射
                    if (player.teslaLv > 0 && enemies.length > 0 && Math.random() < 0.02) {
                        let target = enemies[Math.floor(Math.random()*enemies.length)];
                        let tDmg = player.teslaLv * 20;
                        target.hp -= tDmg; target.flash = 3;
                        createText(target.pos.x, target.pos.y, tDmg, '#c084fc');
                        
                        // 實時繪製一道轉瞬即逝的雷射弧線
                        ctx.save(); ctx.beginPath(); ctx.moveTo(player.pos.x, player.pos.y); ctx.lineTo(target.pos.x, target.pos.y);
                        ctx.strokeStyle = 'rgba(168, 85, 247, 0.7)'; ctx.lineWidth = 2.5; ctx.stroke(); ctx.restore();

                        if (target.hp <= 0) {
                            enemies = enemies.filter(e => e !== target); kills++; score += 50;
                            gems.push({pos: new Vec2(target.pos.x, target.pos.y), val: 1});
                        }
                    }

                    // 仿生蟲移動與碰撞大矩陣
                    for(let i=enemies.length-1; i>=0; i--) {
                        let e = enemies[i];
                        if (e.flash > 0) e.flash--;
                        
                        let ed = e.pos.dist(player.pos);
                        if (ed > 0) {
                            let dir = player.pos.copy().sub(e.pos).normalize().mult(e.speed);
                            e.pos.add(dir);
                        }

                        // 與子彈交火判定
                        bullets.forEach((b, bIdx) => {
                            if (b.pos.dist(e.pos) < e.radius + 3) {
                                bullets.splice(bIdx, 1); e.hp -= 10; e.flash = 4;
                                createText(e.pos.x, e.pos.y, 10, '#67e8f9');
                                if (e.hp <= 0) {
                                    e.dead = true; kills++; score += 40;
                                    gems.push({pos: new Vec2(e.pos.x, e.pos.y), val: e.type==='ELITE'?3:1});
                                }
                            }
                        });

                        // 怪物撞玩家機體
                        if (!e.dead && ed < player.radius + e.radius && player.invincible <= 0) {
                            player.hp -= e.type==='ELITE'? 18 : 8;
                            player.invincible = 25; screenShake = 6;
                            if (player.hp <= 0) { player.hp = 0; state = 'GAMEOVER'; }
                        }

                        if (e.dead) enemies.splice(i, 1);
                    }

                    // 更新背景星空粒子捲動
                    stars.forEach(s => {
                        s.x -= s.speed * dt;
                        if (s.x < 0) s.x = canvas.width;
                    });

                    // 更新文字特效粒子
                    for(let i=particles.length-1; i>=0; i--) {
                        let p = particles[i]; p.y += p.vy; p.alpha -= 0.03;
                        if (p.alpha <= 0) particles.splice(i, 1);
                    }

                } else if (state === 'GAMEOVER') {
                    // 死亡自動倒數重啟機制
                    gameOverCountdown -= dt;
                    if (gameOverCountdown <= 0) { rebootEngine(); }
                }

                // --- 4. THE MASTER CANV RENDER (百分之百繪圖渲染層) ---
                ctx.fillStyle = '#030509';
                ctx.fillRect(0,0,canvas.width,canvas.height);
                
                ctx.save();
                if (screenShake > 0) { screenShake--; ctx.translate((Math.random()-0.5)*5, (Math.random()-0.5)*5); }

                // 畫背景流星
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

                // 畫隨機能量碎塊
                gems.forEach(g => {
                    ctx.beginPath(); ctx.arc(g.pos.x, g.pos.y, g.val>1?5:3, 0, Math.PI*2);
                    ctx.fillStyle = g.val>1?'#ec4899':'#38bdf8'; ctx.fill();
                });

                // 畫子彈
                ctx.fillStyle = '#67e8f9';
                bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.pos.x, b.pos.y, 3, 0, Math.PI*2); ctx.fill(); });

                // 畫蟲群敵軍
                enemies.forEach(e => {
                    ctx.beginPath(); ctx.arc(e.pos.x, e.pos.y, e.radius, 0, Math.PI*2);
                    ctx.fillStyle = e.flash > 0 ? '#fff' : e.col; ctx.fill();
                    ctx.strokeStyle = '#030509'; ctx.stroke();
                });

                // 畫玩家三角載具
                ctx.save(); ctx.translate(player.pos.x, player.pos.y);
                ctx.rotate(Math.atan2(mousePos.y - player.pos.y, mousePos.x - player.pos.x) + Math.PI/2);
                ctx.beginPath(); ctx.moveTo(0, -player.radius); ctx.lineTo(player.radius, player.radius); ctx.lineTo(-player.radius, player.radius); ctx.closePath();
                ctx.fillStyle = player.invincible%4 > 1 ? '#1e1b4b' : '#4f46e5'; ctx.fill();
                ctx.strokeStyle = '#67e8f9'; ctx.lineWidth = 1.5; ctx.stroke();
                ctx.restore();

                // 畫飄動損害數字文字
                particles.forEach(p => {
                    ctx.save(); ctx.globalAlpha = p.alpha; ctx.font = 'bold 11px monospace';
                    ctx.fillStyle = p.col; ctx.fillText(p.txt, p.x, p.y); ctx.restore();
                });
                ctx.restore();

                // --- 5. PURE CANVAS HUD INTERFACE (全 UI 畫布實時直繪) ---
                // 經驗進度條背景
                ctx.fillStyle = '#0f172a'; ctx.fillRect(15, 15, canvas.width - 30, 6);
                // 經驗填充
                ctx.fillStyle = '#3b82f6'; ctx.fillRect(15, 15, (canvas.width - 30) * (player.xp / player.nextXp), 6);

                // 左上數據列繪製
                ctx.fillStyle = '#fff'; ctx.font = 'bold 13px monospace';
                ctx.fillText(`戰機等級: LV.${player.level}`, 15, 42);
                
                // 血條外框與填充
                ctx.fillStyle = '#1e293b'; ctx.fillRect(15, 52, 120, 8);
                ctx.fillStyle = '#ef4444'; ctx.fillRect(15, 52, 120 * (player.hp / player.maxHp), 8);

                // 右上數據列
                let min = Math.floor(gameTime/60).toString().padStart(2,'0');
                let sec = (gameTime%60).toString().padStart(2,'0');
                ctx.textAlign = 'right';
                ctx.fillStyle = '#a5b4fc'; ctx.fillText(`模擬時間: ${min}:${sec}`, canvas.width - 15, 42);
                ctx.fillStyle = '#34d399'; ctx.fillText(`獵殺數: ${kills} // SCORE: ${score}`, canvas.width - 15, 58);
                ctx.textAlign = 'left'; // 恢復錨點

                // 死亡全畫布遮罩與全自動秒數重新啟動
                if (state === 'GAMEOVER') {
                    ctx.fillStyle = 'rgba(3, 5, 9, 0.85)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    ctx.textAlign = 'center';
                    ctx.fillStyle = '#f43f5e'; ctx.font = 'bold 36px monospace';
                    ctx.fillText("機體物理架構解析潰散", canvas.width/2, canvas.height/2 - 20);
                    
                    ctx.fillStyle = '#94a3b8'; ctx.font = '14px monospace';
                    ctx.fillText(`戰術核心損壞 // 系統將在 ${Math.ceil(gameOverCountdown)} 秒內自動重啟模擬...`, canvas.width/2, canvas.height/2 + 20);
                    ctx.textAlign = 'left';
                }

                requestAnimationFrame(tick);
            }

            // 引擎立即強制載入開打
            rebootEngine();
        });
    </script>
</body>
</html>
