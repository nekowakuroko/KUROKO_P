<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>HyperBadass 3D FPS Game</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #000; user-select: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 2px solid rgba(255,255,255,0.7); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 28px; font-weight: bold; text-shadow: 2px 2px #000; z-index: 10; font-family: monospace; }
        #instructions { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; cursor: pointer; z-index: 20; transition: 0.3s; }
        #instructions h1 { font-size: 48px; color: #ff3366; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        #instructions p { font-size: 18px; color: #ccc; margin: 5px 0; }
        .highlight { color: #00ffcc; font-weight: bold; }
    </style>
    <!-- 引進 Three.js 核心庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="instructions">
        <h1>極限網頁 3D FPS</h1>
        <p>點擊畫面鎖定滑鼠並開始遊戲</p>
        <p class="highlight">WASD = 移動 | 滑鼠 = 瞄準 | 左鍵 = 射擊</p>
    </div>

    <script>
        // --- 1. 基本宣告 ---
        let scene, camera, renderer, score = 0;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let yaw = 0, pitch = 0; // 視角旋轉控制
        const targets = [];
        let gun;
        const speed = 0.15;

        const blocker = document.getElementById('instructions');

        // --- 2. 初始化 3D 場景 ---
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a16);
            scene.fog = new THREE.FogExp2(0x0a0a16, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6; // 人類平均雙眼高度

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // 光源設定
            const ambientLight = new THREE.AmbientLight(0x666666);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            scene.add(dirLight);

            // 製造地板 (科技網格風)
            const floorGeo = new THREE.PlaneGeometry(100, 100, 50, 50);
            const floorMat = new THREE.MeshLambertMaterial({ color: 0x111122, wireframe: true });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 製造一把槍並綁定在攝影機上
            const gunGeo = new THREE.BoxGeometry(0.08, 0.08, 0.4);
            const gunMat = new THREE.MeshStandardMaterial({ color: 0x333333, metalness: 0.8, roughness: 0.2 });
            gun = new THREE.Mesh(gunGeo, gunMat);
            gun.position.set(0.15, -0.15, -0.35); // 放在右下角
            camera.add(gun);
            scene.add(camera); // 必須把攝影機加入場景，綁定的槍才會顯示

            // 生成第一批隨機目標 (發光的立方體)
            for (let i = 0; i < 8; i++) {
                spawnTarget();
            }

            // 事件監聽
            window.addEventListener('resize', onWindowResize);
            setupControls();
        }

        // --- 3. 生成敵人/目標 ---
        function spawnTarget() {
            const geo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const mat = new THREE.MeshStandardMaterial({ 
                color: Math.random() * 0xffffff, 
                emissive: 0x221122,
                roughness: 0.1 
            });
            const mesh = new THREE.Mesh(geo, mat);
            
            // 隨機分佈在玩家前方與四周
            mesh.position.x = (Math.random() - 0.5) * 30;
            mesh.position.y = 1 + Math.random() * 3;
            mesh.position.z = -10 - Math.random() * 20;
            
            scene.add(mesh);
            targets.push(mesh);
        }

        // --- 4. 操作控制 (Pointer Lock & Keyboard) ---
        function setupControls() {
            // 點擊畫面請求鎖定滑鼠
            blocker.addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                if (document.pointerLockElement === document.body) {
                    blocker.style.opacity = '0';
                    blocker.style.pointerEvents = 'none';
                } else {
                    blocker.style.opacity = '1';
                    blocker.style.pointerEvents = 'auto';
                }
            });

            // 滑鼠移動控制視角
            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement !== document.body) return;

                yaw -= e.movementX * 0.0022;
                pitch -= e.movementY * 0.0022;

                // 限制上下看夾角，避免頭轉過頭翻過去
                pitch = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, pitch));

                camera.rotation.order = "YXZ";
                camera.rotation.y = yaw;
                camera.rotation.x = pitch;
            });

            // 鍵盤移動開關
            const onKeyDown = (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                }
            };

            const onKeyUp = (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // 點擊左鍵開火
            document.addEventListener('mousedown', (e) => {
                if (document.pointerLockElement !== document.body || e.button !== 0) return;

                // 觸發槍枝後座力動畫
                gun.position.z = -0.25; 

                // 建立模擬彈道射線
                const raycaster = new THREE.Raycaster();
                const center = new THREE.Vector2(0, 0); // 螢幕正中央
                raycaster.setFromCamera(center, camera);

                const intersects = raycaster.intersectObjects(targets);

                if (intersects.length > 0) {
                    const hitObj = intersects[0].object;
                    
                    // 打中特效：閃爍並重置位置
                    hitObj.scale.set(0, 0, 0);
                    setTimeout(() => {
                        hitObj.position.x = (Math.random() - 0.5) * 30;
                        hitObj.position.y = 1 + Math.random() * 3;
                        hitObj.position.z = camera.position.z - 10 - Math.random() * 20;
                        hitObj.scale.set(1, 1, 1);
                    }, 200);

                    score++;
                    document.getElementById('score').innerText = score;
                }
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- 5. 遊戲主迴圈 ---
        function animate() {
            requestAnimationFrame(animate);

            if (document.pointerLockElement === document.body) {
                // 基於當前水平視角 (yaw) 計算移動方向，避免飛天遁地
                const front = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
                const side = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), yaw);

                if (moveForward) camera.position.addScaledVector(front, speed);
                if (moveBackward) camera.position.addScaledVector(front, -speed);
                if (moveLeft) camera.position.addScaledVector(side, -speed);
                if (moveRight) camera.position.addScaledVector(side, speed);
            }

            // 讓目標方塊自轉與上下漂浮，增加射擊難度
            const time = performance.now() * 0.001;
            targets.forEach((target, index) => {
                target.rotation.x += 0.01;
                target.rotation.y += 0.02;
                target.position.y += Math.sin(time + index) * 0.005;
            });

            // 槍枝平滑復位 (Lerp 後座力)
            gun.position.z = THREE.MathUtils.lerp(gun.position.z, -0.35, 0.15);
            gun.position.y = THREE.MathUtils.lerp(gun.position.y, -0.15, 0.15);

            renderer.render(scene, camera);
        }

        // 啟動！
        init();
        animate();
    </script>
</body>
</html>
