<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貓咪惡搞大冒險 | Troll Cat Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #1a1a24; color: #fff; }
        canvas { background-color: #87CEEB; border: 4px solid #000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between select-none">

    <!-- 頂部導覽 -->
    <nav class="bg-slate-900 border-b-4 border-black px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <a href="./" class="text-xs px-3 py-1 bg-slate-800 border-2 border-black rounded font-bold hover:bg-slate-700 transition">← 回首頁</a>
            <span class="text-sm font-black tracking-wider text-yellow-400 font-mono">⚠️ 警告：本遊戲包含極度崩潰內容</span>
        </div>
        <div class="font-mono text-xs text-slate-400">DEATH_COUNTER_ACTIVE</div>
    </nav>

    <!-- 遊戲主舞台 -->
    <main class="flex-grow flex items-center justify-center p-4 relative">
        <div class="relative max-w-4xl w-full flex flex-col items-center">
            
            <!-- HUD 面板 -->
            <div class="w-full max-w-[800px] flex justify-between items-center mb-2 font-mono text-sm bg-slate-950 p-2 border-2 border-black rounded">
                <div class="text-rose-500 font-bold">💀 死亡次數: <span id="deathCount">0</span></div>
                <div class="text-yellow-400 font-bold" id="gameStatus">關卡 1：看起來很正常的平原</div>
                <div class="text-emerald-400">操作：A/D鍵移動，空白鍵跳躍</div>
            </div>

            <!-- 核心 Canvas -->
            <canvas id="trollCanvas" width="800" height="400" class="w-full h-auto block"></canvas>

            <!-- 彈出式大崩潰結算層 -->
            <div id="trollOverlay" class="absolute inset-0 bg-black/80 backdrop-blur-sm hidden flex flex-col items-center justify-center text-center p-6 rounded-xl">
                <h2 class="text-4xl font-black text-rose-500 mb-2" id="overlayTitle">勝敗乃兵家常事</h2>
                <p class="text-slate-400 text-sm mb-6" id="overlayMsg">這也能死？想不到吧？</p>
                <button id="respawnBtn" class="px-6 py-3 bg-yellow-500 hover:bg-yellow-400 text-black font-black text-sm border-4 border-black rounded-xl active:scale-95 transition-all shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                    復活再戰 (RESTART)
                </button>
            </div>

        </div>
    </main>

    <!-- 頁尾 -->
    <footer class="bg-slate-950 border-t-4 border-black py-2 text-center text-[10px] text-slate-600 font-mono">
        ANTI-GRAVITY CAT PARODY ENGINE V1.0 // NO REFUNDS
    </footer>

    <!-- 遊戲邏輯控制核心 -->
    <script>
        const canvas = document.getElementById('trollCanvas');
        const ctx = canvas.getContext('2d');

        // 全局計數器
        let deaths = 0;
        let isDead = false;
        let hasWon = false;

        // 玩家設定
        let player = {
            x: 50, y: 300, width: 30, height: 30,
            vx: 0, vy: 0, speed: 4, jumpForce: 11,
            gravity: 0.5, isGrounded: false
        };

        // 按鍵監聽
        let keys = { a: false, d: false, space: false };

        window.addEventListener('keydown', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') {
                keys.space = true;
                e.preventDefault();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
            if (e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
            if (e.code === 'Space' || e.code === 'KeyW' || e.code === 'ArrowUp') keys.space = false;
        });

        // 惡搞地圖物件陣列設定
        let platforms = [];
        let trollBlocks = [];
        let spikes = [];
        let goal = { x: 730, y: 230, width: 20, height: 120 };

        function initMap() {
            isDead = false;
            hasWon = false;
            document.getElementById('trollOverlay').classList.add('hidden');
            document.getElementById('gameStatus').innerText = "關卡 1：看起來很正常的平原";

            // 重置玩家
            player.x = 50; player.y = 250; player.vx = 0; player.vy = 0;

            // 地板與標準平台
            platforms = [
                { x: 0, y: 350, width: 250, height: 50 },  // 起始地面
                { x: 380, y: 350, width: 120, height: 50 }, // 中間小島
                { x: 580, y: 350, width: 220, height: 50 }, // 終點地面
                { x: 180, y: 240, width: 60, height: 20 }   // 看似安全的磚塊
            ];

            // 惡搞陷阱 1：隱形方塊（當跳到一半時會突然出現把你撞進深淵）
            trollBlocks = [
                { x: 285, y: 190, width: 35, height: 35, visible: false, type: 'block' },
                { x: 440, y: 240, width: 30, height: 30, visible: true, type: 'poison_coin' } // 問號方塊
            ];

            // 惡搞陷阱 2：隱藏地刺（走到特定位置才會突然升起）
            spikes = [
                { x: 120, y: 355, width: 30, height: 20, active: false, triggerX: 100 },
                { x: 410, y: 355, width: 30, height: 20, active: true, triggerX: 0 } // 一開始就看得見的刺
            ];
        }

        // 死亡判定觸發
        function playerDie(msg) {
            if (isDead) return;
            isDead = true;
            deaths++;
            document.getElementById('deathCount').innerText = deaths;
            document.getElementById('overlayTitle').innerText = "💀 你死了";
            document.getElementById('overlayMsg').innerText = msg;
            document.getElementById('trollOverlay').classList.remove('hidden');
        }

        // AABB 碰撞檢測基礎核心
        function checkCollision(rect1, rect2) {
            return rect1.x < rect2.x + rect2.width &&
                   rect1.x + rect1.width > rect2.x &&
                   rect1.y < rect2.y + rect2.height &&
                   rect1.y + rect1.height > rect2.y;
        }

        // 遊戲主迴圈
        function update() {
            if (isDead || hasWon) return;

            // 玩家左右移動
            if (keys.a) player.vx = -player.speed;
            else if (keys.d) player.vx = player.speed;
            else player.vx = 0;

            // 物理重力計算
            player.vy += player.gravity;
            player.x += player.vx;
            player.y += player.vy;
            player.isGrounded = false;

            // 限制左邊界
            if (player.x < 0) player.x = 0;

            // 1. 與正常平台碰撞檢測
            platforms.forEach(p => {
                if (checkCollision(player, p)) {
                    // 從上方踩上平台
                    if (player.vy > 0 && player.y + player.height - player.vy <= p.y + 4) {
                        player.y = p.y - player.height;
                        player.vy = 0;
                        player.isGrounded = true;
                    }
                }
            });

            // 跳躍輸入處理
            if (keys.space && player.isGrounded) {
                player.vy = -player.jumpForce;
                player.isGrounded = false;
            }

            // 2. 處理惡搞隱形/陷阱磚塊
            trollBlocks.forEach(tb => {
                // 檢測是否從「下方」撞擊磚塊
                if (checkCollision(player, tb)) {
                    if (player.vy < 0 && player.y - player.vy >= tb.y + tb.height - 4) {
                        player.y = tb.y + tb.height;
                        player.vy = 1; // 被反彈向下
                        
                        if (!tb.visible && tb.type === 'block') {
                            tb.visible = true; // 隱形磚顯形！成功把玩家頂進懸崖
                        }
                        
                        if (tb.type === 'poison_coin') {
                            playerDie("這個問號方塊是有毒的，你頭骨碎裂了。");
                        }
                    }
                }
            });

            // 3. 處理突發性陷阱刺
            spikes.forEach(s => {
                // 如果玩家走過觸發點，隱形地刺瞬間彈出
                if (!s.active && player.x > s.triggerX && player.x < s.triggerX + 40) {
                    s.active = true;
                    s.y = 330; // 猛烈刺出地面
                }
                
                if (s.active && checkCollision(player, s)) {
                    playerDie("地表突然噴出鋼刺，你變成了貓咪串燒。");
                }
            });

            // 惡搞終點旗桿陷阱：碰到旗桿時，旗桿會突然倒塌砸死玩家
            if (checkCollision(player, goal)) {
                if (player.x > goal.x - 10) {
                    playerDie("想不到吧！旗桿頂端帶有 萬伏高壓電，你被電焦了。");
                }
            }

            // 掉落虛空深淵死亡判定
            if (player.y > canvas.height) {
                playerDie("你掉進了無底深淵。這裡除了重力什麼都沒有。");
            }

            // --- 畫面繪製渲染區塊 ---
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 繪製背景藍天白雲
            ctx.fillStyle = "#87CEEB";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 繪製正常平台（綠色草地外觀）
            platforms.forEach(p => {
                ctx.fillStyle = "#49a038";
                ctx.fillRect(p.x, p.y, p.width, p.height);
                ctx.fillStyle = "#2d6322";
                ctx.fillRect(p.x, p.y, p.width, 6); // 草地頂部深色邊
            });

            // 繪製惡搞方塊
            trollBlocks.forEach(tb => {
                if (tb.visible) {
                    ctx.fillStyle = tb.type === 'poison_coin' ? "#d97706" : "#475569";
                    ctx.fillRect(tb.x, tb.y, tb.width, tb.height);
                    ctx.strokeStyle = "#000";
                    ctx.strokeRect(tb.x, tb.y, tb.width, tb.height);
                    
                    // 畫個問號
                    ctx.fillStyle = "#fff";
                    ctx.font = "bold 14px sans-serif";
                    ctx.fillText("?", tb.x + 12, tb.y + 20);
                }
            });

            // 繪製地刺
            ctx.fillStyle = "#78716c";
            spikes.forEach(s => {
                if (s.active) {
                    ctx.beginPath();
                    ctx.moveTo(s.x, s.y + s.height);
                    ctx.lineTo(s.x + s.width/2, s.y);
                    ctx.lineTo(s.x + s.width, s.y + s.height);
                    ctx.fill();
                }
            });

            // 繪製終點旗桿
            ctx.fillStyle = "#ef4444";
            ctx.fillRect(goal.x, goal.y, goal.width, 15); // 旗幟
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(goal.x + 15, goal.y, 5, goal.height); // 桿子

            // 繪製主角馬力喵（用可愛的顏文字代替圖片，載入速度極快）
            ctx.font = "26px sans-serif";
            ctx.fillText("🐱", player.x, player.y + 24);
        }

        // 啟動遊戲引擎
        initMap();
        setInterval(update, 1000 / 60); // 鎖定穩定 60 幀執行

        // 點擊復活再戰
        document.getElementById('respawnBtn').addEventListener('click', () => {
            initMap();
        });
    </script>
</body>
</html>
